kind: skill
ref: skills/creating-dotnet-mcp-servers
scenarios:
  - name: basic-mcp-server
    description: Create a basic .NET MCP server with a single tool
    prompt: |
      Create a .NET 9 MCP server that exposes a weather lookup tool.
      The tool should accept a city name and return a mock temperature.
      Use the Microsoft.Extensions.AI MCP server pattern with AddMcpServer().
    expectations:
      keywords:
        - "AddMcpServer"
        - "[McpServerTool"
      patterns:
        - '/class \w+Tool/'
    judge:
      criteria: |
        Score on the following criteria (0-10 each), average them:
        - Correctness: Does the implementation use the correct MCP server APIs?
        - Completeness: Is the tool fully implemented with proper input/output?
        - Best practices: Does it follow .NET 9 patterns and proper DI?
      passing_score: 7.0
    timeout: 60
    runs: 3

  - name: mcp-server-with-resources
    description: Create an MCP server that exposes both tools and resources
    prompt: |
      Create a .NET 9 MCP server that exposes:
      1. A tool to list available files in a directory
      2. A resource that returns the content of a specific file
      Follow the official Microsoft.Extensions.AI.Mcp patterns.
    expectations:
      keywords:
        - "AddMcpServer"
        - "[McpServerTool"
        - "[McpServerResource"
    judge:
      criteria: |
        Score on:
        - Correctness: Are both tools and resources properly implemented?
        - API usage: Does it use the correct McpServerTool and McpServerResource attributes?
        - Code quality: Clean, readable, well-structured code?
      passing_score: 7.0
    timeout: 90
    runs: 2
