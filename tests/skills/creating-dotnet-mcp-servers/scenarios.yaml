kind: skill
ref: skills/creating-dotnet-mcp-servers
scenarios:
  - name: create-basic-mcp-tool
    description: Create a basic MCP tool class — skill must guide attributes and conventions
    prompt: |
      Create a .NET MCP tool class called "WeatherTools" with a method "GetWeather"
      that takes a city name and returns the current temperature.
    expectations:
      keywords:
        - "[McpServerToolType]"
        - "[McpServerTool"
        - "[Description"
    judge:
      criteria: |
        Score on:
        - Tool class is sealed and decorated with [McpServerToolType] attribute?
        - Method is decorated with [McpServerTool] and [Description] attributes?
        - Method accepts a CancellationToken parameter?
        - Parameters are decorated with [Description] attributes?
        - Tool name is defined as a const string, not a magic string?
      passing_score: 7.0
    timeout: 90
    runs: 2

  - name: configure-aot-json-serialization
    description: AOT-compatible JSON serialization — skill must guide context and registration
    prompt: |
      I have a .NET MCP server with a "PackageMetadata" record as a tool return type.
      Configure AOT-compatible JSON serialization and register it in Program.cs.
    expectations:
      keywords:
        - "JsonSerializerContext"
        - "[JsonSerializable"
    judge:
      criteria: |
        Score on:
        - A partial class inheriting from JsonSerializerContext is created?
        - [JsonSerializable] attributes are added for all tool return types?
        - The serialization context is registered via WithTools or equivalent?
        - Reflection-based serialization is disabled (JsonSerializerIsReflectionEnabledByDefault=false)?
      passing_score: 7.0
    timeout: 90
    runs: 2

  - name: setup-transport-in-program
    description: Transport configuration — skill must guide SSE vs Stdio setup
    prompt: |
      Show me how to configure both SSE (HTTP) and Stdio transports for a .NET MCP server.
    expectations:
      keywords:
        - "AddMcpServer"
        - "MapMcp"
    judge:
      criteria: |
        Score on:
        - SSE transport uses WithHttpTransport() and maps endpoints with MapMcp()?
        - Stdio transport uses WithStdioTransport() without MapMcp()?
        - Logging is configured to write to stderr (LogToStandardErrorThreshold)?
        - The difference between SSE and Stdio setup is clearly explained?
      passing_score: 7.0
    timeout: 90
    runs: 2
