name: Evaluation Run (Reusable)

on:
  workflow_call:
    inputs:
      entries:
        description: 'JSON matrix of entries to evaluate'
        type: string
        required: true
      model:
        description: 'LLM model to use'
        type: string
        default: 'gpt-4o'
      runs:
        description: 'Number of runs per scenario'
        type: string
        default: '3'
      pr-number:
        description: 'PR number for commenting results'
        type: string
        default: ''
    secrets:
      LLM_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Evaluate each entry in parallel ──────────────────────────────────────
  evaluate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.entries) }}
    name: Evaluate ${{ matrix.kind }}:${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        working-directory: tools/evaluator
        run: npm ci

      - name: Write single entry to file
        run: |
          echo '${{ toJson(matrix) }}' > /tmp/single-entry.json
          echo '{"entries": [${{ toJson(matrix) }}]}' > /tmp/entries.json

      - name: Run evaluation
        working-directory: tools/evaluator
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::warning::LLM_API_KEY is not configured — skipping evaluation for ${{ matrix.kind }}:${{ matrix.name }}"
            mkdir -p /tmp/results
            exit 0
          fi
          mkdir -p /tmp/results
          npx tsx src/index.ts evaluate \
            --entries /tmp/entries.json \
            --model "${{ inputs.model }}" \
            --output /tmp/results \
            --repo-root ${{ github.workspace }} \
            --source "${{ inputs.pr-number != '' && 'pr' || 'scheduled' }}" \
            --commit-sha "${{ github.sha }}"

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-${{ matrix.kind }}-${{ matrix.name }}
          path: /tmp/results/
          retention-days: 30
          if-no-files-found: ignore

  # ── Comment on PR with aggregated results ────────────────────────────────
  comment-on-pr:
    needs: evaluate
    if: always() && inputs.pr-number != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        working-directory: tools/evaluator
        run: npm ci

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          pattern: evaluation-results-*
          path: /tmp/all-results
          merge-multiple: true

      - name: Generate PR comment
        working-directory: tools/evaluator
        run: |
          npx tsx src/index.ts report \
            --results /tmp/all-results \
            --format markdown \
            --output /tmp/pr-comment.md

          cat /tmp/pr-comment.md

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/pr-comment.md', 'utf8');
            const prNumber = parseInt('${{ inputs.pr-number }}', 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user?.type === 'Bot' &&
              c.body?.startsWith('## 🤖 Evaluation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
              core.info(`Updated existing comment #${botComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info('Created new PR comment');
            }
