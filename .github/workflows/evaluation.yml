name: Evaluation Pipeline

# Trigger model:
#   pull_request        → same-repo PRs: sets initial evaluation-status (success or pending)
#   pull_request_target → fork PRs:      sets initial evaluation-status (always pending)
#   issue_comment       → /evaluate gate + full evaluation pipeline
#   workflow_dispatch   → manual pipeline, evaluate_all flag supported
#   schedule            → incremental pipeline against benchmark baseline (Mondays 06:00 UTC)

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'plugins/**'
      - 'instructions/**'
      - 'tests/**'
      - 'tools/evaluator/**'
      - 'website/**'
      - 'agents/**'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  pull_request:
    paths:
      - 'skills/**'
      - 'plugins/**'
      - 'instructions/**'
      - 'tests/**'
      - 'tools/evaluator/**'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'skills/**'
      - 'plugins/**'
      - 'instructions/**'
      - 'tests/**'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      evaluate_all:
        description: 'Force evaluate all eligible assets (ignore baseline)'
        type: boolean
        default: false
      model:
        description: 'LLM model to use'
        type: string
        default: 'gpt-4o'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

concurrency:
  group: evaluation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  statuses: write
  actions: read

jobs:

  # ── PR Status ─────────────────────────────────────────────────────────────
  # Sets the initial evaluation-status commit status for all PR events.
  #
  # Same-repo PRs (pull_request):
  #   - Resolves to success  when no evaluable asset files changed
  #   - Resolves to pending  when evaluable assets changed (/evaluate required)
  #
  # Fork PRs (pull_request_target):
  #   - Always resolves to pending to signal /evaluate is available
  #   - Does NOT execute any code from the PR branch (security boundary)
  #
  # Ensures evaluation-status is never stuck in Expected state.
  pr-status:
    name: Set PR evaluation status
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
    steps:
      - name: Determine whether evaluable assets changed
        id: check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const isFork = context.payload.pull_request.head.repo?.full_name
              !== `${context.repo.owner}/${context.repo.repo}`;

            // Fork PRs: always pending — evaluation must be triggered via /evaluate
            if (isFork) {
              core.setOutput('relevant', 'true');
              return;
            }

            // Same-repo PRs: check changed files via API
            const evalPaths = [
              'skills/', 'plugins/', 'instructions/', 'tests/',
              'tools/evaluator/', '.github/workflows/',
            ];
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const hasRelevant = files.some(f =>
              evalPaths.some(p => f.filename.startsWith(p))
            );
            core.setOutput('relevant', hasRelevant ? 'true' : 'false');

      - name: Post success — no evaluable assets changed
        if: steps.check.outputs.relevant == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'evaluation-status',
              description: 'No evaluable assets changed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Post pending — assets changed, /evaluate required
        if: steps.check.outputs.relevant == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'evaluation-status',
              description: 'Assets changed — comment /evaluate to trigger evaluation',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  # ── Gate ──────────────────────────────────────────────────────────────────
  # Validates the /evaluate slash command.
  #
  # Requirements:
  #   - Comment must be on a pull request (not a plain issue)
  #   - Comment body must start with /evaluate
  #   - Commenter must have write, maintain, or admin permission
  #
  # Outputs: pr-number, base-sha, head-sha, is-fork
  # Side-effect: immediately posts pending evaluation-status on the PR head commit
  gate:
    name: Validate /evaluate command
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/evaluate')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    outputs:
      pr-number: ${{ steps.guard.outputs.pr-number }}
      base-sha: ${{ steps.guard.outputs.base-sha }}
      head-sha: ${{ steps.guard.outputs.head-sha }}
      is-fork: ${{ steps.guard.outputs.is-fork }}
    steps:
      - name: Check permission and extract PR details
        id: guard
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // Verify the commenter has write or above
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const allowed = ['write', 'maintain', 'admin'];
            if (!allowed.includes(perm.permission)) {
              core.setFailed(
                `${context.actor} has '${perm.permission}' permission — /evaluate requires write or above`
              );
              return;
            }

            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const isFork =
              pr.head.repo?.full_name !== `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput('pr-number', String(prNumber));
            core.setOutput('base-sha', pr.base.sha);
            core.setOutput('head-sha', pr.head.sha);
            core.setOutput('is-fork', String(isFork));

            // Set pending immediately after gate passes
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state: 'pending',
              context: 'evaluation-status',
              description: '/evaluate triggered — evaluation in progress',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  # ── Discover ──────────────────────────────────────────────────────────────
  # Builds the to-evaluate matrix.
  #
  # Issue comment (/evaluate):
  #   - Diffs PR base→head to detect changed assets
  # workflow_dispatch with evaluate_all=true:
  #   - Forces all eligible assets (ignores baseline)
  # workflow_dispatch with evaluate_all=false, and schedule:
  #   - Uses benchmark summary as baseline (includes only changed or new assets)
  #
  # Eligibility rule: only assets with a matching scenarios.yaml test file.
  # Infra invalidation: changes to .github/workflows/*.yaml or tools/evaluator/ → evaluate all.
  # Empty matrix: skipped=true when nothing needs evaluation.
  #
  # Fork PR handling:
  #   - Evaluator code always runs from the default branch
  #   - Fork PR assets are checked out read-only at _pr-assets/
  discover:
    name: Discover assets to evaluate
    needs: [gate]
    if: |
      always() && (
        (github.event_name == 'issue_comment' && needs.gate.result == 'success') ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event_name == 'push' ||
        github.event_name == 'pull_request'
      )
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      skipped: ${{ steps.parse.outputs.skipped }}
      is-infra-change: ${{ steps.parse.outputs.is-infra-change }}
      is-fork: ${{ needs.gate.outputs.is-fork || 'false' }}
      pr-number: ${{ needs.gate.outputs.pr-number || '' }}
      head-sha: ${{ needs.gate.outputs.head-sha || '' }}
    steps:
      # Evaluator code always runs from the default branch
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Fork PR assets: check out read-only at _pr-assets/
      - name: Checkout fork PR assets (read-only)
        if: needs.gate.outputs.is-fork == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.gate.outputs.head-sha }}
          path: _pr-assets
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        run: cd tools/evaluator && npm ci

      - name: Download benchmark summary (scheduled/manual only)
        if: github.event_name != 'issue_comment'
        id: download-summary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: benchmark-summary
          path: _benchmark

      - name: Discover changed assets
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVALUATE_ALL: ${{ inputs.evaluate_all || 'false' }}
          PR_BASE_SHA: ${{ needs.gate.outputs.base-sha || github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ needs.gate.outputs.head-sha || github.event.pull_request.head.sha || '' }}
          IS_FORK: ${{ needs.gate.outputs.is-fork || 'false' }}
        run: |
          OUTPUT="${RUNNER_TEMP}/discovered.json"

          # Debug: show event and environment
          echo "EVENT_NAME=${EVENT_NAME}"
          echo "EVALUATE_ALL=${EVALUATE_ALL}"
          echo "IS_FORK=${IS_FORK}"
          echo "PR_BASE_SHA=${PR_BASE_SHA}"
          echo "PR_HEAD_SHA=${PR_HEAD_SHA}"

          # Assets are evaluated from the PR overlay for fork PRs
          if [ "${IS_FORK}" = "true" ] && [ -d "${GITHUB_WORKSPACE}/_pr-assets" ]; then
            REPO_ROOT="${GITHUB_WORKSPACE}/_pr-assets"
          else
            REPO_ROOT="${GITHUB_WORKSPACE}"
          fi

          echo "REPO_ROOT=${REPO_ROOT}"
          echo "Listing asset dirs:"
          ls -la "${REPO_ROOT}/plugins/" 2>/dev/null || echo "No plugins dir"
          ls -la "${REPO_ROOT}/skills/" 2>/dev/null || echo "No skills dir"
          ls -la "${REPO_ROOT}/tests/plugins/" 2>/dev/null || echo "No tests/plugins dir"

          cd "${GITHUB_WORKSPACE}/tools/evaluator"

          if [ "${EVENT_NAME}" = "issue_comment" ]; then
            # /evaluate on PR: evaluate only the skills modified in this PR
            npx tsx src/index.ts discover \
              --repo-root "${REPO_ROOT}" \
              --base-ref "${PR_BASE_SHA}" \
              --head-ref "${PR_HEAD_SHA}" \
              --output "${OUTPUT}"

          elif [ "${EVENT_NAME}" = "pull_request" ]; then
            # PR trigger: path filters already ensure relevant files changed.
            # Use --all to reliably catch new assets (scenarios.yaml may not exist at base).
            npx tsx src/index.ts discover \
              --repo-root "${REPO_ROOT}" \
              --all \
              --output "${OUTPUT}"

          elif [ "${EVALUATE_ALL}" = "true" ]; then
            # Force all eligible assets, ignore baseline
            npx tsx src/index.ts discover \
              --repo-root "${REPO_ROOT}" \
              --all \
              --output "${OUTPUT}"

          else
            # push / schedule / manual: evaluate new + changed assets
            # Prefer repo-committed summary over short-lived artifact
            BENCHMARK_PATH="${GITHUB_WORKSPACE}/website/src/data/benchmarks/summary.json"
            if [ -f "${GITHUB_WORKSPACE}/_benchmark/summary.json" ]; then
              BENCHMARK_PATH="${GITHUB_WORKSPACE}/_benchmark/summary.json"
            fi

            if [ -f "${BENCHMARK_PATH}" ]; then
              echo "Using benchmark summary: ${BENCHMARK_PATH}"
              # --all --benchmark-summary evaluates ONLY assets absent from the baseline.
              # Assets already present in the summary (passing or failing) are skipped.
              npx tsx src/index.ts discover \
                --repo-root "${REPO_ROOT}" \
                --all \
                --benchmark-summary "${BENCHMARK_PATH}" \
                --output "${OUTPUT}"
            else
              # No baseline at all: evaluate every eligible asset unconditionally.
              echo "No benchmark summary found — running full evaluation scan"
              npx tsx src/index.ts discover \
                --repo-root "${REPO_ROOT}" \
                --all \
                --output "${OUTPUT}"
            fi
          fi

          echo "output=${OUTPUT}" >> "${GITHUB_OUTPUT}"
          echo "Discovery output:"
          cat "${OUTPUT}"

      - name: Parse discovery result
        id: parse
        shell: node {0}
        env:
          OUTPUT: ${{ steps.discover.outputs.output }}
          GITHUB_OUTPUT_PATH: ${{ github.output }}
        run: |
          const fs = require('node:fs');
          const path = require('node:path');

          const outputFile = process.env.OUTPUT || '';
          const githubOutput = process.env.GITHUB_OUTPUT || '';

          let result;
          try {
            const raw = fs.readFileSync(outputFile, 'utf8');
            result = JSON.parse(raw);
          } catch (err) {
            console.error('Failed to read/parse discovery file:', err.message);
            result = { skipped: true, isInfraChange: false, entries: [] };
          }

          const skipped = result.skipped ? 'true' : 'false';
          const isInfra = result.isInfraChange ? 'true' : 'false';
          const entries = Array.isArray(result.entries) ? result.entries : [];
          const matrix = (result.skipped || entries.length === 0)
            ? '[]'
            : JSON.stringify(entries.map(e => ({
                id: e.id,
                kind: e.kind,
                assetPath: e.assetPath,
                testPath: e.testPath || '',
              })));

          // Write outputs using heredoc delimiter for matrix (JSON with quotes)
          const lines = [
            `skipped=${skipped}`,
            `is-infra-change=${isInfra}`,
            `matrix<<MATRIX_EOF`,
            matrix,
            `MATRIX_EOF`,
          ];
          fs.appendFileSync(githubOutput, lines.join('\n') + '\n');

  # ── Evaluate ──────────────────────────────────────────────────────────────
  # Fan-out matrix job: one runner per discovered asset.
  # Uploads per-asset results as short-lived artifacts.
  #
  # Fork PR handling:
  #   - Evaluator code runs from the default branch
  #   - Fork PR assets are checked out read-only at _pr-assets/
  # Same-repo PRs may evaluate PR-head evaluator changes.
  evaluate:
    name: Evaluate ${{ matrix.entry.id }}
    needs: [discover]
    if: ${{ always() && needs.discover.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        entry: ${{ fromJson(needs.discover.outputs.matrix || '[]') }}
    steps:
      # Evaluator always runs from the default branch for fork PRs
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Fork PR assets: read-only at _pr-assets/
      - name: Checkout fork PR assets (read-only)
        if: needs.discover.outputs.is-fork == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.discover.outputs.head-sha }}
          path: _pr-assets
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        run: cd tools/evaluator && npm ci

      - name: Run evaluation
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          ASSET_ID: ${{ matrix.entry.id }}
          ASSET_KIND: ${{ matrix.entry.kind }}
          ASSET_PATH: ${{ matrix.entry.assetPath }}
          TEST_PATH: ${{ matrix.entry.testPath }}
          MODEL: ${{ inputs.model || 'gpt-4o' }}
          IS_FORK: ${{ needs.discover.outputs.is-fork }}
          HEAD_SHA: ${{ needs.discover.outputs.head-sha }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          # Resolve commit SHA: use PR head SHA for /evaluate, default SHA otherwise
          if [ "${EVENT_NAME}" = "issue_comment" ] && [ -n "${HEAD_SHA}" ]; then
            COMMIT_SHA="${HEAD_SHA}"
          else
            COMMIT_SHA="${DEFAULT_SHA}"
          fi

          # Resolve evaluation source
          case "${EVENT_NAME}" in
            schedule) SOURCE="scheduled" ;;
            issue_comment|pull_request|pull_request_target) SOURCE="pr" ;;
            push) SOURCE="push" ;;
            *) SOURCE="manual" ;;
          esac

          # Assets come from the PR overlay for fork PRs
          if [ "${IS_FORK}" = "true" ] && [ -d "${GITHUB_WORKSPACE}/_pr-assets" ]; then
            REPO_ROOT="${GITHUB_WORKSPACE}/_pr-assets"
          else
            REPO_ROOT="${GITHUB_WORKSPACE}"
          fi

          mkdir -p "${RUNNER_TEMP}/results"
          ENTRIES_FILE="${RUNNER_TEMP}/entries.json"
          cat > "${ENTRIES_FILE}" <<EOF
          {
            "entries": [{
              "id": "${ASSET_ID}",
              "kind": "${ASSET_KIND}",
              "assetPath": "${ASSET_PATH}",
              "testPath": "${TEST_PATH}",
              "changedFiles": []
            }]
          }
          EOF

          cd "${GITHUB_WORKSPACE}/tools/evaluator"
          npx tsx src/index.ts evaluate \
            --entries "${ENTRIES_FILE}" \
            --model "${MODEL}" \
            --provider openai \
            --output "${RUNNER_TEMP}/results" \
            --repo-root "${REPO_ROOT}" \
            --source "${SOURCE}" \
            --commit-sha "${COMMIT_SHA}" || echo "evaluation-failed=true" >> "$GITHUB_OUTPUT"

      - name: Sanitize artifact name
        if: always()
        id: sanitize-name
        run: |
          RAW_NAME="result-${{ matrix.entry.id }}"
          SAFE_NAME="${RAW_NAME//:/-}"
          echo "artifact_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.sanitize-name.outputs.artifact_name }}
          path: ${{ runner.temp }}/results/
          retention-days: 1

  # ── Merge Benchmark ───────────────────────────────────────────────────────
  # The only stage allowed to modify summary.json in the pipeline workspace.
  # Emits changed=true/false and summary-path for the persist-benchmark guard.
  # Preserves existing entries when no fresh results are available.
  # Runs even when evaluate was skipped or partially failed.
  merge-benchmark:
    name: Merge benchmark results
    needs: [discover, evaluate]
    if: always() && needs.discover.result == 'success' && needs.discover.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.merge.outputs.changed }}
      summary-path: ${{ steps.merge.outputs.summary-path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        run: cd tools/evaluator && npm ci

      - name: Download all result artifacts
        id: download-results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          pattern: result-*
          path: ${{ runner.temp }}/all-results
          merge-multiple: true

      - name: Merge results into benchmark summary
        id: merge
        run: |
          BENCHMARK_DIR="${GITHUB_WORKSPACE}/website/src/data/benchmarks"
          RESULTS_DIR="${RUNNER_TEMP}/all-results"
          mkdir -p "${BENCHMARK_DIR}" "${RESULTS_DIR}"

          cd "${GITHUB_WORKSPACE}/tools/evaluator"
          npx tsx src/index.ts report \
            --results "${RESULTS_DIR}" \
            --format benchmark \
            --output "${BENCHMARK_DIR}"

          # Detect whether summary.json was created or modified
          cd "${GITHUB_WORKSPACE}"
          if git status --porcelain "website/src/data/benchmarks/summary.json" | grep -q .; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "summary-path=website/src/data/benchmarks/summary.json" >> "${GITHUB_OUTPUT}"

      - name: Upload updated benchmark summary
        if: steps.merge.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-summary
          path: website/src/data/benchmarks/summary.json
          retention-days: 7

  # ── Persist Benchmark ─────────────────────────────────────────────────────
  # Commits the updated summary.json back to the default branch.
  #
  # Guards — only runs when ALL of these are true:
  #   - merge-benchmark reports changed=true
  #   - event is workflow_dispatch or schedule (NOT /evaluate / issue_comment)
  #   - running on the default branch (not a feature or PR branch)
  #
  # Uses pull-before-push reconciliation to handle concurrent runs.
  # Uses concurrency group to serialize writes.
  persist-benchmark:
    name: Persist benchmark to repository
    needs: [merge-benchmark]
    if: |
      needs.merge-benchmark.result == 'success' &&
      needs.merge-benchmark.outputs.changed == 'true' &&
      github.event_name != 'issue_comment' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    concurrency:
      group: persist-benchmark
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download updated benchmark summary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: benchmark-summary
          path: website/src/data/benchmarks

      - name: Commit and push benchmark summary
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Pull latest to handle concurrent runs (pull-before-push reconciliation)
          git pull --rebase origin "${{ github.event.repository.default_branch }}"

          if git diff --quiet website/src/data/benchmarks/summary.json; then
            echo "No changes to commit — summary already up to date"
            exit 0
          fi

          git add website/src/data/benchmarks/summary.json
          git commit -m "chore: update benchmark summary"
          git push origin "${{ github.event.repository.default_branch }}"

  # ── Report ────────────────────────────────────────────────────────────────
  # Posts the final evaluation-status and a summary report.
  #
  # For /evaluate runs:   posts a PR comment + Actions summary
  # For scheduled/manual: posts an Actions summary only
  #
  # Report includes:
  #   - evaluated, skipped, failed counts
  #   - per-asset status lines
  #   - workflow run link
  report:
    name: Report evaluation results
    needs: [discover, evaluate, merge-benchmark]
    if: always() && needs.discover.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        run: cd tools/evaluator && npm ci

      - name: Download all result artifacts
        if: needs.discover.outputs.skipped != 'true'
        id: download-results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          pattern: result-*
          path: ${{ runner.temp }}/all-results
          merge-multiple: true

      - name: Generate report
        id: report
        env:
          SKIPPED: ${{ needs.discover.outputs.skipped }}
          EVALUATE_RESULT: ${{ needs.evaluate.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          REPORT_PATH="${RUNNER_TEMP}/report.md"
          RESULTS_DIR="${RUNNER_TEMP}/all-results"
          mkdir -p "${RESULTS_DIR}"

          if [ "${SKIPPED}" = "true" ]; then
            cat > "${REPORT_PATH}" <<EOF
          ## Evaluation Result

          ✅ No evaluable assets changed — evaluation skipped.

          [View workflow run](${RUN_URL})
          EOF
          else
            cd "${GITHUB_WORKSPACE}/tools/evaluator"
            npx tsx src/index.ts report \
              --results "${RESULTS_DIR}" \
              --format markdown \
              --output "${REPORT_PATH}" || true

            echo "" >> "${REPORT_PATH}"
            echo "[View workflow run](${RUN_URL})" >> "${REPORT_PATH}"
          fi

          echo "report-path=${REPORT_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload evaluation report artifact
        if: needs.discover.outputs.skipped != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: evaluation-report
          path: ${{ steps.report.outputs.report-path }}
          retention-days: 30

      - name: Post PR comment (for /evaluate runs and auto PR evaluation)
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ steps.report.outputs.report-path }}';
            const body = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '⚠️ Report generation failed — check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            const prNumber = parseInt('${{ needs.discover.outputs.pr-number || github.event.pull_request.number }}', 10);
            if (prNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
      
      - name: Write Actions summary
        run: |
          REPORT_PATH="${{ steps.report.outputs.report-path }}"
          if [ -f "${REPORT_PATH}" ]; then
            cat "${REPORT_PATH}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Evaluation" >> "${GITHUB_STEP_SUMMARY}"
            echo "No report generated." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Set final evaluation-status (for /evaluate runs and auto PR evaluation)
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const evaluateFailed = '${{ needs.evaluate.result }}' === 'failure';
            const state = evaluateFailed ? 'failure' : 'success';
            const description = evaluateFailed
              ? 'Some evaluations failed — check the report'
              : 'Evaluation complete';
            const headSha = '${{ needs.discover.outputs.head-sha }}' || '${{ github.event.pull_request.head.sha }}';
            if (!headSha) return;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              state,
              context: 'evaluation-status',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });