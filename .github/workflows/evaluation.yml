name: Evaluation Pipeline

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'plugins/**'
      - 'instructions/**'
      - 'tests/**'
      - 'tools/evaluator/**'

  issue_comment:
    types: [created]

  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

  workflow_dispatch:
    inputs:
      model:
        description: 'LLM model to use for evaluation'
        required: false
        default: 'gpt-4o'
        type: string
      runs:
        description: 'Number of runs per scenario'
        required: false
        default: '3'
        type: string
      evaluate_all:
        description: 'Evaluate all assets (ignore changes)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: read

concurrency:
  group: evaluation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── PR commit status (pending) ────────────────────────────────────────────
  pr-status:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        working-directory: tools/evaluator
        run: npm ci

      - name: Discover changed assets
        id: discover
        working-directory: tools/evaluator
        run: |
          npx tsx src/index.ts discover \
            --base-ref origin/${{ github.base_ref }} \
            --head-ref ${{ github.sha }} \
            --repo-root ${{ github.workspace }} \
            --output /tmp/discovered.json

          SKIPPED=$(node -e "const d=require('/tmp/discovered.json'); console.log(d.skipped)")
          ENTRIES=$(node -e "const d=require('/tmp/discovered.json'); console.log(d.entries.length)")
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "entries=$ENTRIES" >> "$GITHUB_OUTPUT"

      - name: Post pending status
        if: steps.discover.outputs.skipped == 'false'
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.sha }}
          status: pending
          context: 'evaluation / results'
          description: 'Evaluating ${{ steps.discover.outputs.entries }} changed asset(s)…'

  # ── Slash command gate ────────────────────────────────────────────────────
  gate:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/evaluate')
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.pr-info.outputs.number }}
      pr-sha: ${{ steps.pr-info.outputs.sha }}
      authorized: ${{ steps.check-permission.outputs.authorized }}
    steps:
      - name: Check commenter permission
        id: check-permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const level = perm.permission;
            const authorized = ['admin', 'write'].includes(level);
            core.setOutput('authorized', authorized.toString());
            if (!authorized) {
              core.warning(`User ${context.actor} does not have write permission (level: ${level})`);
            }

      - name: Get PR details
        id: pr-info
        if: steps.check-permission.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('number', pr.data.number.toString());
            core.setOutput('sha', pr.data.head.sha);

  # ── Discover what to evaluate ─────────────────────────────────────────────
  discover:
    needs: gate
    if: |
      always() && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' && needs.gate.outputs.authorized == 'true')
      )
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      skipped: ${{ steps.build-matrix.outputs.skipped }}
      isInfraChange: ${{ steps.build-matrix.outputs.isInfraChange }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && needs.gate.outputs.pr-sha || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        working-directory: tools/evaluator
        run: npm ci

      - name: Discover assets
        id: build-matrix
        working-directory: tools/evaluator
        env:
          EVALUATE_ALL: ${{ github.event.inputs.evaluate_all || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref || 'main' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVALUATE_ALL" == "true" || "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            npx tsx src/index.ts discover \
              --all \
              --repo-root ${{ github.workspace }} \
              --output /tmp/discovered.json
          else
            npx tsx src/index.ts discover \
              --base-ref origin/$BASE_REF \
              --head-ref $HEAD_SHA \
              --repo-root ${{ github.workspace }} \
              --output /tmp/discovered.json
          fi

          SKIPPED=$(node -e "const d=require('/tmp/discovered.json'); console.log(d.skipped)")
          IS_INFRA=$(node -e "const d=require('/tmp/discovered.json'); console.log(d.isInfraChange)")
          MATRIX=$(node -e "
            const d=require('/tmp/discovered.json');
            const entries = d.entries.map(e => ({ id: e.id, kind: e.kind, name: e.id.split(':')[1] }));
            console.log(JSON.stringify({ include: entries }));
          ")

          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "isInfraChange=$IS_INFRA" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          cat /tmp/discovered.json

      - name: Upload discovery result
        uses: actions/upload-artifact@v4
        with:
          name: discovered-entries
          path: /tmp/discovered.json

  # ── Run evaluations ───────────────────────────────────────────────────────
  run-evaluation:
    needs: discover
    if: needs.discover.outputs.skipped != 'true'
    uses: ./.github/workflows/evaluation-run.yml
    with:
      entries: ${{ needs.discover.outputs.matrix }}
      model: ${{ github.event.inputs.model || 'gpt-4o' }}
      runs: ${{ github.event.inputs.runs || '3' }}
      pr-number: ${{ github.event.pull_request.number || github.event.issue.number || '' }}
    secrets:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

  # ── Post final commit status ──────────────────────────────────────────────
  report-status:
    needs: [run-evaluation, discover]
    if: always() && github.event_name == 'pull_request' && needs.discover.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post success status
        if: needs.run-evaluation.result == 'success'
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.sha }}
          status: success
          context: 'evaluation / results'
          description: 'All evaluations passed ✅'

      - name: Post failure status
        if: needs.run-evaluation.result != 'success'
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.sha }}
          status: failure
          context: 'evaluation / results'
          description: 'Some evaluations failed ❌'

  # ── Publish benchmark data ────────────────────────────────────────────────
  publish-benchmark:
    needs: run-evaluation
    if: |
      always() &&
      needs.run-evaluation.result == 'success' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: tools/evaluator/package-lock.json

      - name: Install evaluator dependencies
        working-directory: tools/evaluator
        run: npm ci

      - name: Download evaluation results
        uses: actions/download-artifact@v4
        with:
          pattern: evaluation-results-*
          path: /tmp/all-results
          merge-multiple: true

      - name: Update benchmark data
        working-directory: tools/evaluator
        run: |
          npx tsx src/index.ts report \
            --results /tmp/all-results \
            --format benchmark \
            --output ${{ github.workspace }}/website/src/data/benchmarks

      - name: Commit benchmark data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/src/data/benchmarks/
          git diff --staged --quiet || git commit -m "chore: update benchmark data [skip ci]"
          git push
